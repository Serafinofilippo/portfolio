<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serafino_Filippo_portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/ian4oyh.css">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3.5.35/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue-router@5.1.0/dist/vue-router.global.prod.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000 url('./pixel art.webp') center/cover no-repeat fixed; }

    /* ══ LOGIN ══ */
    .login-page {
      position: fixed; inset: 0;
      background: url('./desktop%20login.webp') center / cover no-repeat;
    }
    .login-center {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center;
      gap: clamp(20px, 4vh, 56px);
    }
    .avatar-wrap {
      overflow: hidden; border: 2px solid #000;
      box-shadow: 0 4px 4px rgba(0,0,0,.5);
    }
    .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; display: block; }
    .login-btn {
      background: url('./login.png') 50% / 100% 100% no-repeat;
      image-rendering: pixelated;
      color: #FFF3F3; font-family: 'Lato', sans-serif;
      text-align: center; -webkit-text-stroke-color: #1a0050;
      border: none; cursor: pointer; transition: filter .18s;
      touch-action: manipulation; display: block;
    }
    .login-btn:hover  { filter: brightness(1.12) saturate(1.1); }
    .login-btn:active { filter: brightness(.85); }
    .arch-glow {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 200;
      background: radial-gradient(circle,
        #fff 0%, rgba(255,255,255,.98) 10%,
        rgba(220,100,255,.95) 25%, rgba(0,220,255,.85) 50%,
        rgba(255,60,200,.50) 72%, transparent 100%);
      filter: blur(8px); opacity: 0;
    }
    .white-flash { position: fixed; inset: 0; background: #fff; z-index: 300; opacity: 0; pointer-events: none; }

    /* ══ DESKTOP ══ */
    .desktop-page {
      position: fixed; inset: 0;
      background: url('./desktop_layout%20enter.webp') center / cover no-repeat;
      touch-action: none;
    }
    .desktoporastort {
      position: fixed; inset: 0;
      background: url('./desktop_layout%20enter.webp') center / cover no-repeat;
      filter: url(#crystalDisplace); z-index: 2; opacity: 0; pointer-events: none;
      transition: opacity .55s ease;
      -webkit-mask-image: radial-gradient(circle 160px at var(--cx,50%) var(--cy,50%), white 0%, white 30%, rgba(255,255,255,.5) 60%, transparent 100%);
      mask-image: radial-gradient(circle 160px at var(--cx,50%) var(--cy,50%), white 0%, white 30%, rgba(255,255,255,.5) 60%, transparent 100%);
    }

    /* ══ CARTELLE DESKTOP ══ */
    .folder-btn {
      position: fixed; display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; z-index: 10; background: transparent; border: none;
      padding: 4px; border-radius: 4px; transition: background .15s;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .folder-btn:hover  { background: rgba(255,255,255,.15); }
    .folder-btn:active { background: rgba(255,255,255,.25); }
    .folder-label {
      color: #FFF; font-family: "fayte-pixel-hard", monospace;
      text-align: center; white-space: nowrap;
    }

    /* ══ TASKBAR ══ */
    .taskbar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 15; pointer-events: none; }
    .taskbar svg.taskbar-bg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .start-btn {
      position: absolute; left: 0; top: 0;
      background: linear-gradient(180deg, #FFF 0%, #FFF600 42.79%, #B9B303 99.52%);
      box-shadow: 0 4px 12.5px 2px #000;
      pointer-events: all; cursor: pointer; z-index: 2; border: none;
    }
    .nav-btn {
      position: absolute; top: 0;
      background: rgba(0,0,0,.18); border: none; border-right: 1px solid rgba(0,0,0,.28);
      color: #FFF; font-family: "fayte-pixel-hard", monospace;
      cursor: pointer; pointer-events: all; z-index: 2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background .15s; touch-action: manipulation;
    }
    .nav-btn:hover, .nav-btn:active { background: rgba(255,255,255,.22); }
    .min-win-btn { display: flex; align-items: center; gap: 4px; padding: 0 6px; }
    .min-win-icon { height: 60%; width: auto; image-rendering: pixelated; flex-shrink: 0; }
    .clock-live {
      position: absolute; right: 0; top: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #FFF; font-family: 'Lato', sans-serif;
      text-align: center; pointer-events: none; z-index: 2; line-height: 1.2;
    }

    /* ══ FINESTRA SEZIONE ══ */
    .section-overlay {
      position: fixed; inset: 0; background: transparent;
      z-index: 50; display: flex; align-items: center; justify-content: center;
    }
    * { cursor: none !important; }
    #cur {
      position: fixed; top: 0; left: 0;
      width: 14px; height: 14px;
      border: 2px solid #CC44FF;
      border-radius: 50%;
      will-change: transform;
      pointer-events: none; z-index: 9999;
      background: transparent;
      transition: width .2s ease, height .2s ease, background .2s ease, border-color .2s ease;
    }
    #cur.cur-big {
      width: 44px; height: 44px;
      border-color: #FF88DD;
      background: rgba(204,68,255,.12);
    }
    .section-window {
      background:
        linear-gradient(transparent, transparent) padding-box,
        linear-gradient(135deg, #FF99CC 0%, #DD55FF 35%, #9922BB 70%, #FF88DD 100%) border-box;
      border: 8px solid transparent;
      display: flex; flex-direction: column; overflow: hidden;
      max-width: 100vw; max-height: 100dvh;
      position: relative;
    }
    .proj-panel {
      position: absolute; z-index: 20;
      width: min(680px, 90%); height: min(800px, 88%);
      background:
        linear-gradient(#E4E4E4,#E4E4E4) padding-box,
        linear-gradient(135deg,#FF99CC 0%,#DD55FF 35%,#9922BB 70%,#FF88DD 100%) border-box;
      border: 6px solid transparent;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 6px 6px 28px rgba(0,0,0,.75);
      transition: left .22s ease, top .22s ease, width .22s ease, height .22s ease;
    }
    .proj-panel-bar {
      background: linear-gradient(90deg,#9922CC 0%,#CC44FF 30%,#FF88DD 55%,#CC44FF 75%,#9922CC 100%);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 6px; flex-shrink: 0; height: 26px;
      cursor: move; user-select: none;
    }
    .proj-panel-bar span { color:#FFF; font-family:"fayte-pixel-hard",monospace; font-size:22px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
    .proj-panel-bar .pp-win-btns { display:flex; align-items:center; gap:3px; flex-shrink:0; }
    .proj-panel-bar .pp-btn { background:#E8C200; border:1px solid; border-color:#FFEE55 #998800 #998800 #FFEE55; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#553300; font-family:'Lato',sans-serif; font-weight:700; line-height:1; padding:0; flex-shrink:0; width:18px; height:18px; font-size:12px; transition:background .1s; }
    .proj-panel-bar .pp-btn:hover { background:#FFD700; }
    .proj-panel-bar .pp-btn-close:hover { background:#FF3333; color:#FFF; border-color:#FF9999 #CC0000 #CC0000 #FF9999; }
    .section-titlebar {
      background: linear-gradient(90deg, #9922CC 0%, #CC44FF 30%, #FF88DD 55%, #CC44FF 75%, #9922CC 100%);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 6px; flex-shrink: 0;
    }
    .section-titlebar h2 {
      color: #FFF; font-family: "fayte-pixel-hard", monospace;
      text-shadow: 1px 1px 0 #660099;
      display: flex; align-items: center; gap: 8px;
      flex: 1; min-width: 0; overflow: hidden;
    }
    .title-text {
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .win-btns { display: flex; align-items: center; gap: 3px; }
    .win-btn {
      background: #E8C200; border: 1px solid;
      border-color: #FFEE55 #998800 #998800 #FFEE55;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #553300; font-family: 'Lato', sans-serif;
      line-height: 1; padding: 0; flex-shrink: 0; transition: background .1s;
    }
    .win-btn:hover { background: #FFD700; }
    .win-btn-close:hover { background: #FF3333; color: #FFF; border-color: #FF9999 #CC0000 #CC0000 #FF9999; }

    /* ── Bottone indietro ── */
    .back-btn {
      background: rgba(150,0,220,.5); border: 1px solid #FF88DD;
      color: #FFF; font-family: "fayte-pixel-hard", monospace;
      font-size: clamp(10px,1.2vw,14px);
      cursor: pointer; padding: 2px 7px; line-height: 1; flex-shrink: 0;
      transition: background .12s;
    }
    .back-btn:hover { background: rgba(200,0,255,.8); }

    /* ── Griglia icone ── */
    .section-body {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 16px;
      background-image: url('./pixel art.webp');
      background-position: center top;
      background-size: cover;
      background-repeat: no-repeat;
      image-rendering: pixelated;
      display: flex; flex-direction: column;
      align-items: flex-start; gap: 10px;
      position: relative;
    }
    .section-body::-webkit-scrollbar { width: 14px; }
    .section-body::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-left: 1px solid #9999AA; }
    .section-body::-webkit-scrollbar-thumb { background: #B0AABB; border: 1px solid; border-color: #FFF #808099 #808099 #FFF; }

    .app-icon {
      position: relative;
      background: transparent; border: none; cursor: pointer;
      padding: 0; display: inline-block;
      transition: transform .15s, filter .15s;
      touch-action: manipulation;
    }
    .app-icon:nth-child(even) { align-self: flex-end; }
    .app-icon:hover  { transform: scale(1.07); filter: drop-shadow(0 0 16px rgba(200,0,255,.9)); }
    .app-icon:active { transform: scale(0.97); }
    .app-icon img {
      position: relative; z-index: 2;
      width: clamp(160px, 28vw, 360px);
      height: auto; image-rendering: pixelated; display: block;
    }
    .app-icon-label { position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%); z-index: 3; }


    .app-icon-label {
      position: absolute; top: 50%; left: 0; right: 0;
      transform: translateY(-50%);
      color: #FFF; font-family: "fayte-pixel-hard", monospace;
      font-size: clamp(26px, 3vw, 34px); text-align: center;
      padding: 0 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      pointer-events: none;
    }
    

    /* ── Carosello ── */
    .sec-carousel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .car-wrap {
      flex: 1; min-height: 0; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: #E4E4E4;
    }
    .car-img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    .car-prev { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); z-index: 3; }
    .car-next { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); z-index: 3; }
    .car-nav {
      background: rgba(60,0,120,.70); border: 2px solid #FF88DD;
      color: #FFF; font-size: clamp(20px,3vw,38px);
      cursor: pointer; padding: 6px 12px; z-index: 3; line-height: 1;
      transition: background .12s; backdrop-filter: blur(4px);
    }
    .car-nav:hover { background: rgba(180,0,255,.90); }
    .car-counter {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 3;
      background: rgba(40,0,80,.80); color: #FF88DD;
      font-family: "fayte-pixel-hard", monospace; font-size: clamp(13px,1.4vw,17px);
      padding: 3px 10px; pointer-events: none; backdrop-filter: blur(4px);
    }
    .car-desc {
      flex-shrink: 0; max-height: 52%; overflow-y: auto;
      padding: 52px 72px 56px; margin: 0;
      background: url('./box%20testo.webp') center / 100% 100% no-repeat;
      image-rendering: pixelated;
      color: #111;
      font-family: 'Lato', sans-serif;
      font-size: clamp(11px,1.1vw,13px); line-height: 1;
      border-top: 2px solid #CC44FF;
      position: relative;
    }
    .car-desc-name {
      display: block; margin-bottom: 10px;
      color: #7700AA; font-family: "fayte-pixel-hard", monospace;
      font-size: clamp(14px,1.6vw,19px); letter-spacing: 3px;
    }
    .car-desc::after {
      content: '▼'; position: absolute; bottom: 55px; right: 74px; z-index: 5;
      color: #FF88FF; font-size: clamp(8px,1vw,11px);
      animation: blink .9s step-end infinite; pointer-events: none;
    }
    @keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:0 } }

    /* ── Pannello flottante (About, Contact) ── */
    .panel-overlay {
      background: url('./desktop_layout%20enter.webp') center / cover no-repeat !important;
      pointer-events: none;
      align-items: flex-start !important;
      justify-content: flex-start !important;
    }
    .panel-overlay .section-window {
      pointer-events: all;
      position: fixed !important;
    }
    .panel-body {
      background: #C8C4BC;
      padding: 18px 20px 22px;
      overflow-y: auto;
      max-height: 78vh;
    }
    .panel-titlebar-drag { cursor: move; }
    /* ── Animazioni character select ── */
    @keyframes csPanelIn {
      0%   { opacity:0; transform:scaleY(0.04) scaleX(0.6) }
      40%  { opacity:1; transform:scaleY(1.04) scaleX(1)   }
      100% { transform:scaleY(1) scaleX(1)                 }
    }
    @keyframes csFadeUp {
      from { opacity:0; transform:translateY(10px) }
      to   { opacity:1; transform:translateY(0)    }
    }
    @keyframes csCharIn {
      0%   { opacity:0; transform:scale(2.2); filter:blur(28px) brightness(3) }
      55%  { opacity:1; filter:blur(5px) brightness(1.6)                       }
      100% { transform:scale(1); filter:blur(0) brightness(1)                  }
    }
    @keyframes csGlitch {
      0%,82%,100% { transform:skewX(0);       color:#FF88DD }
      83%         { transform:skewX(-7deg);    color:#00FFEE }
      85%         { transform:skewX(7deg);     color:#FF0099 }
      87%         { transform:skewX(-3deg);    color:#FF88DD }
      89%         { transform:skewX(0)                      }
    }
    @keyframes csStat80 { from{width:0} to{width:80%} }
    @keyframes csStat70 { from{width:0} to{width:70%} }
    @keyframes csStat90 { from{width:0} to{width:90%} }
    @keyframes csBarGlow { 0%,100%{box-shadow:0 0 6px rgba(255,136,221,.5)} 50%{box-shadow:0 0 14px rgba(255,136,221,.9)} }


    /* ── Pannello flottante nel desktop ── */
    .float-panel {
      position: fixed; z-index: 20;
      background:
        linear-gradient(#E4E4E4,#E4E4E4) padding-box,
        linear-gradient(135deg,#FF99CC 0%,#DD55FF 35%,#9922BB 70%,#FF88DD 100%) border-box;
      border: 8px solid transparent;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 4px 4px 20px rgba(0,0,0,.65);
      animation: csPanelIn 0.35s steps(7) both;
      transform-origin: top center;
    }
    .float-panel-bar { cursor: move; user-select: none; }
    .static-content {
      color: #3A0055; font-family: 'Lato', sans-serif;
      font-size: clamp(13px,1.5vw,15px); line-height: 2;
    }
    .static-content .label {
      font-family: "fayte-pixel-hard", monospace;
      font-size: clamp(30px,4vw,46px); color: #7700AA; display: block; margin-bottom: 28px;
    }

    /* ══ LATO UTILITY ══ */
    .lato-thin         { font-family:"Lato",sans-serif; font-weight:100; font-style:normal; }
    .lato-light        { font-family:"Lato",sans-serif; font-weight:300; font-style:normal; }
    .lato-regular      { font-family:"Lato",sans-serif; font-weight:400; font-style:normal; }
    .lato-bold         { font-family:"Lato",sans-serif; font-weight:700; font-style:normal; }
    .lato-black        { font-family:"Lato",sans-serif; font-weight:900; font-style:normal; }
    .lato-thin-italic  { font-family:"Lato",sans-serif; font-weight:100; font-style:italic; }
    .lato-light-italic { font-family:"Lato",sans-serif; font-weight:300; font-style:italic; }
    .lato-regular-italic{ font-family:"Lato",sans-serif; font-weight:400; font-style:italic; }
    .lato-bold-italic  { font-family:"Lato",sans-serif; font-weight:700; font-style:italic; }
    .lato-black-italic { font-family:"Lato",sans-serif; font-weight:900; font-style:italic; }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 1023px) {
      .section-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px; padding: 14px;
        align-items: start;
      }
      .app-icon { width: 100%; display: block; }
      .app-icon:nth-child(even) { align-self: auto; }
      .app-icon img { width: 100%; height: auto; }
      .app-icon-label { font-size: clamp(22px, 2.8vw, 30px); }
      .section-titlebar h2 { overflow: hidden; min-width: 0; }
      .section-titlebar h2 span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    }
    @media (max-width: 600px) {
      .section-body { gap: 10px; padding: 10px; }
      .app-icon-label { font-size: clamp(22px, 4.5vw, 30px); }
      .car-nav { padding: 4px 8px; font-size: clamp(18px, 6vw, 32px); }
      .car-desc { padding: 10px 12px 16px; font-size: clamp(10px, 2.8vw, 13px); max-height: 45%; }
      .car-desc-name { font-size: clamp(13px, 3vw, 17px); }
      .proj-panel { width: 96% !important; height: 90% !important; }
      .proj-panel-bar span { font-size: 12px; }
      .car-counter { font-size: clamp(11px, 2.5vw, 14px); }
    }
    @media (max-width: 1023px) and (orientation: landscape) and (max-height: 540px) {
      .proj-panel { width: 92% !important; height: 95% !important; }
      .car-desc { max-height: 35%; }
    }

    /* ══ OVERLAY "RUOTA" — portrait su mobile ══ */
    @keyframes rotatePhone {
      0%,100% { transform: rotate(0deg);   }
      30%,70% { transform: rotate(-90deg); }
    }
    .rotate-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 99999;
      background: #0a0020;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 22px; text-align: center; padding: 32px;
    }
    .rotate-overlay .rot-icon {
      font-size: 58px; line-height: 1; display: block;
      animation: rotatePhone 2.8s ease-in-out infinite;
    }
    .rotate-overlay .rot-title {
      font-family: "fayte-pixel-hard", monospace;
      color: #FF88FF; font-size: clamp(10px, 4vw, 15px);
      text-shadow: 0 0 10px #FF00EE; margin: 0;
    }
    .rotate-overlay .rot-sub {
      font-family: 'Lato', sans-serif;
      color: #CC88FF; font-size: clamp(12px, 3.5vw, 15px); margin: 0;
    }
    @media (orientation: portrait) and (max-width: 1023px) {
      .rotate-overlay { display: none !important; }
    }
  </style>
</head>

<body>
  <!-- Mostrato solo in portrait su mobile: il sito è landscape-first -->
  <div class="rotate-overlay">
    <span class="rot-icon">📱</span>
    <p class="rot-title">RUOTA IL DISPOSITIVO</p>
    <p class="rot-sub">Questo sito è ottimizzato per la visualizzazione orizzontale</p>
  </div>

  <div id="app"><router-view></router-view></div>

  <script>
    const { createApp } = Vue
    const { createRouter, createWebHashHistory } = VueRouter
    let _loggedIn = false
    const _minimized = Vue.reactive([])

    function cc(DW, DH, x, y, w, h) {
      const vw = window.innerWidth, vh = window.innerHeight
      const s  = Math.max(vw / DW, vh / DH)
      return { left: (vw - DW*s)/2 + x*s, top: (vh - DH*s)/2 + y*s, width: w*s, height: h*s, s }
    }

    /* ══ LOGIN ══ */
    const LoginPage = {
      name: 'LoginPage',
      template: `
        <div class="login-page" ref="page">
          <div class="login-center" ref="lc">
            <div class="avatar-wrap" ref="av"><img src="./pixel.webp" alt="avatar"/></div>
            <button class="login-btn" ref="btn" @click="go">LOGIN</button>
          </div>
          <div class="arch-glow" ref="glow"></div>
          <div class="white-flash" ref="flash"></div>
        </div>
      `,
      methods: {
        go() {
          const { page, av, btn, glow, flash } = this.$refs
          gsap.killTweensOf([btn, av])
          const arch = cc(1440,1024,720,265,0,0)
          const glowD = Math.max(window.innerWidth, window.innerHeight) * 4
          gsap.set(glow, { width:glowD, height:glowD, left:arch.left, top:arch.top, xPercent:-50, yPercent:-50, scale:0, opacity:0 })
          gsap.set(flash, { opacity:0 })
          const tl = gsap.timeline()
          tl.to([av, btn], { opacity:0, duration:.2 }, 0)
          tl.to(page, { scale:5, duration:1.6, ease:'power3.in', transformOrigin: arch.left+'px '+arch.top+'px' }, .05)
          tl.to(glow, { scale:.08, opacity:.7, duration:.25, ease:'power1.out' }, .3)

        data(){ return { W:400, bH:36, tFs:12, px:0, py:0 } },
        computed: { bS(){ return { width:Math.round(this.bH*.62)+'px', height:Math.round(this.bH*.62)+'px', fontSize:Math.max(5,Math.round(this.tFs*.5))+'px' } } },
        methods: {
          minimize(){ _minimized.push({ label: title, route: this.$route.path }); this.$router.push('/desktop') },
          dragStart(e) {
            this._ox = e.clientX - this.px; this._oy = e.clientY - this.py
            this._onMove = ev => { this.px = ev.clientX - this._ox; this.py = ev.clientY - this._oy }
            this._onUp   = () => { document.removeEventListener('mousemove', this._onMove); document.removeEventListener('mouseup', this._onUp) }
            document.addEventListener('mousemove', this._onMove)
            document.addEventListener('mouseup', this._onUp)
          },
          dragStartTouch(e) {
            const t = e.touches[0]
            this._ox = t.clientX - this.px; this._oy = t.clientY - this.py
            this._onTMove = ev => { const t=ev.touches[0]; this.px=t.clientX-this._ox; this.py=t.clientY-this._oy }

            document.addEventListener('touchmove', this._onTMove, { passive:false })
            document.addEventListener('touchend', this._onTEnd)
          },
          init() {
            const vw=window.innerWidth, vh=window.innerHeight, mob=vw<768
            this.W   = Math.min(Math.max(300, Math.round(vw * 0.32)), 460)
            this.bH  = Math.max(mob?36:28, Math.round(vw*.033))
            this.tFs = Math.max(mob?12:11, Math.round(vw*.018))
            this.px  = Math.round((vw - this.W) / 2)
            this.py  = Math.round(vh * 0.18)
          }
        },
        mounted(){
          this.init()
                  }
      }

      function loop(t) {
        const dt = last ? Math.min((t - last) / 16.67, 2) : 1;
        last = t;
        const f = 1 - Math.pow(0.80, dt);
        cx += (tx - cx) * f;
        cy += (ty - cy) * f;
        cur.style.transform = 'translate(' + (cx - hw) + 'px,' + (cy - hh) + 'px)';
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
